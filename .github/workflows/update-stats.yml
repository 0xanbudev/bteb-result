name: Update BTEB Stats

on:
  schedule:
    # Runs every 25 days (on the 1st and 26th of each month at 00:00 UTC)
    - cron: '0 0 */25 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run stats updater
        run: python .github/scripts/update_stats.py

      - name: Commit and push changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md chart.svg
          if git diff --cached --quiet; then
            echo "No changes detected. Skipping commit."
          else
            git commit -m "chore: auto-update stats [skip ci]"
            git push
            echo "Changes pushed successfully."
          fi
