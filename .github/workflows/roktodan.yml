name: ROKTODAN API Monitor [CHECKED]

on:
  schedule:
    - cron: '0 0 */25 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Check API status
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://www.roktodan.xyz/api/teams/members)

          if [ "$STATUS" = "200" ]; then
            echo "STATUS=UP" >> $GITHUB_ENV
            echo "$(date) - API UP" >> log.txt
          else
            echo "STATUS=DOWN" >> $GITHUB_ENV
            echo "$(date) - API DOWN (HTTP $STATUS)" >> log.txt
          fi

      - name: Update workflow name
        run: |
          if [ "$STATUS" = "UP" ]; then
            sed -i '1s/.*/name: API Monitor [UP]/' .github/workflows/raktodan.yml
          else
            sed -i '1s/.*/name: API Monitor [DOWN]/' .github/workflows/raktodan.yml
          fi

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add log.txt .github/workflows/raktodan.yml

          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "chore: api monitor update [skip ci]"
            git push
          fi
