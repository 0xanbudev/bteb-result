name: API Monitor [CHECKED]

on:
  schedule:
    - cron: '0 0 */25 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check API
        id: api
        run: |
          STATUS=$(curl -s https://www.roktodan.xyz/api/teams/members | jq -r '.success')

          if [ "$STATUS" = "true" ]; then
            echo "STATUS=UP" >> $GITHUB_ENV
            echo "$(date -u) - API UP" >> log.txt
          else
            echo "STATUS=DOWN" >> $GITHUB_ENV
            echo "$(date -u) - API DOWN" >> log.txt
          fi

      - name: Update workflow name
        run: |
          FILE=".github/workflows/raktodan.yml"

          if [ -f "$FILE" ]; then
            if [ "$STATUS" = "UP" ]; then
              sed -i '1s/.*/name: API Monitor [UP]/' "$FILE"
            else
              sed -i '1s/.*/name: API Monitor [DOWN]/' "$FILE"
            fi
          else
            echo "Workflow file not found"
          fi

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add log.txt .github/workflows/raktodan.yml

          if git diff --cached --quiet; then
            echo "No changes detected"
          else
            git commit -m "chore: API monitor update [skip ci]"
            git push
          fi
