name: API Monitor

on:
  schedule:
    - cron: '0 0 */25 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install requests

      - name: Run API monitor script
        run: |
          python .github/scripts/roktodan.py

      - name: Commit log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add roktodan_log.txt || true

          if git diff --cached --quiet; then
            echo "No changes detected"
          else
            git commit -m "chore: update API monitor log [skip ci]"
            git push
          fi
