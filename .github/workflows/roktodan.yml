name: API Monitor

on:
  schedule:
    - cron: '0 0 */25 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check API
        run: |
          RESPONSE=$(curl -s -w "%{http_code}" -o api.json https://www.roktodan.xyz/api/teams/members)
          CODE=$RESPONSE

          if [ "$CODE" = "200" ]; then
            SUCCESS=$(jq -r '.success // false' api.json 2>/dev/null || echo "false")

            if [ "$SUCCESS" = "true" ]; then
              echo "$(date -u) - API UP" >> log.txt
            else
              echo "$(date -u) - API DOWN (invalid response)" >> log.txt
            fi
          else
            echo "$(date -u) - API DOWN (HTTP $CODE)" >> log.txt
          fi

      - name: Commit log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add log.txt

          if git diff --cached --quiet; then
            echo "No changes detected"
          else
            git commit -m "chore: API monitor log [skip ci]"
            git push
          fi
