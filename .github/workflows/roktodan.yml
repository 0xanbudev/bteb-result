name: API Monitor [CHECKED]

on:
  schedule:
    - cron: '0 0 */25 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Check API
        run: |
          RESPONSE=$(curl -s -w "%{http_code}" -o api.json https://www.roktodan.xyz/api/teams/members)
          CODE=$RESPONSE

          if [ "$CODE" = "200" ]; then
            SUCCESS=$(jq -r '.success // false' api.json 2>/dev/null || echo "false")

            if [ "$SUCCESS" = "true" ]; then
              echo "STATUS=UP" >> $GITHUB_ENV
              echo "$(date -u) - API UP" >> log.txt
            else
              echo "STATUS=DOWN" >> $GITHUB_ENV
              echo "$(date -u) - API DOWN (invalid JSON)" >> log.txt
            fi
          else
            echo "STATUS=DOWN" >> $GITHUB_ENV
            echo "$(date -u) - API DOWN (HTTP $CODE)" >> log.txt
          fi

      - name: Update workflow name
        run: |
          FILE=".github/workflows/raktodan.yml"

          if [ "$STATUS" = "UP" ]; then
            sed -i '1s/.*/name: API Monitor [UP]/' $FILE
          else
            sed -i '1s/.*/name: API Monitor [DOWN]/' $FILE
          fi

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add log.txt .github/workflows/raktodan.yml

          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "chore: api monitor update [skip ci]"
            git push
          fi
