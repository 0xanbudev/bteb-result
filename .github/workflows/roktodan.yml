name: API Monitor

on:
  schedule:
    - cron: '0 0 */25 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check API with retry
        run: |
          URL="https://www.roktodan.xyz/api/teams/members"
          SUCCESS="false"

          for i in 1 2 3; do
            echo "Attempt $i..."
            RESPONSE=$(curl -s -w "%{http_code}" -o api.json "$URL")

            if [ "$RESPONSE" = "200" ]; then
              SUCCESS=$(jq -r '.success // false' api.json 2>/dev/null || echo "false")
              if [ "$SUCCESS" = "true" ]; then
                break
              fi
            fi

            sleep 5
          done

          if [ "$SUCCESS" = "true" ]; then
            echo "$(date -u) - API UP" >> log.txt
          else
            echo "$(date -u) - API DOWN" >> log.txt
          fi

      - name: Commit log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add log.txt

          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "chore: api monitor log [skip ci]"
            git push
          fi
